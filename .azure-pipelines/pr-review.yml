# Pipeline: pr-review
# Trigger: PR opened/updated on main.
# Role: Runs three reviewer subagents in parallel (code, security, tech-debt).
#       Each posts PR comments. None approves — humans approve and merge.

trigger: none

pr:
  branches:
    include: [main]
  paths:
    exclude:
      - '.claude/trace/**'                      # trace-only changes don't need review
      - 'docs/designs/**'                       # design PRs go through design-gen, not here

variables:
  - group: ai-sdlc-secrets
  - name: PR_ID
    value: $(System.PullRequest.PullRequestId)

jobs:
  - job: parallel_review
    displayName: 'Review PR in parallel'
    pool: { vmImage: 'ubuntu-latest' }
    timeoutInMinutes: 40
    strategy:
      matrix:
        code:
          AGENT: 'code-reviewer'
          SKILL: 'pr-review'
          MODEL: 'claude-sonnet-4-6'
          MAX_TURNS: 40
        security:
          AGENT: 'security-auditor'
          SKILL: 'security-review'
          MODEL: 'claude-sonnet-4-6'
          MAX_TURNS: 40
        debt:
          AGENT: 'tech-debt-auditor'
          SKILL: 'tech-debt-review'
          MODEL: 'claude-haiku-4-5-20251001'    # cost-sensitive; debt is pattern-matchy
          MAX_TURNS: 30
      maxParallel: 3

    steps:
      - checkout: self
        persistCredentials: true
        fetchDepth: 0                           # full history — git diff vs origin/main

      - bash: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq
          sudo curl -sSLo /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          az extension add --name azure-devops --yes --only-show-errors
        displayName: 'Install tooling'

      - bash: |
          set -euo pipefail
          echo "$(ADO_PAT)" | az devops login --organization "$(System.CollectionUri)"
          az devops configure --defaults \
            organization="$(System.CollectionUri)" \
            project="$(System.TeamProject)"
        displayName: 'Azure DevOps CLI login'
        env:
          ADO_PAT: $(ADO_PAT)

      - bash: chmod +x .claude/hooks/*.sh .claude/scripts/*.sh
        displayName: 'Make hooks and scripts executable'

      - task: ClaudeCodeBaseTask@1
        displayName: 'Run reviewer: $(AGENT)'
        inputs:
          anthropicApiKey: $(ANTHROPIC_API_KEY)
          prompt: 'Use the $(AGENT) subagent to run /$(SKILL) on PR $(PR_ID). Return its JSON summary at the end.'
          outputFormat: 'stream-json'
          maxTurns: $(MAX_TURNS)
          model: $(MODEL)
          allowedTools: 'Task,Read,Grep,Glob,Bash(git:*),Bash(az:*),Bash(jq:*),Bash(.claude/scripts/*)'
          extraArgs: '--dangerously-skip-permissions'
        env:
          CLAUDE_RUN_ID: '$(Build.BuildId)-$(AGENT)'
          SLACK_WEBHOOK_URL: $(SLACK_WEBHOOK_URL)

      - bash: |
          set -euo pipefail
          mkdir -p "$(Build.ArtifactStagingDirectory)/$(AGENT)"
          if [[ -d .claude/trace ]]; then
            cp -r .claude/trace "$(Build.ArtifactStagingDirectory)/$(AGENT)/"
          fi
        displayName: 'Archive reviewer trace'
        condition: always()

      - publish: $(Build.ArtifactStagingDirectory)
        artifact: claude-trace-$(AGENT)
        condition: always()

# Pipeline: design-gen
# Trigger: ADO Service Hook on WorkItemUpdated where tags contain 'ai:ready'.
# Role: Runs /requirements-analysis skill, producing a design PR.

trigger: none
pr: none

resources:
  webhooks:
    - webhook: ado-workitem-ai-ready
      connection: ado-service-hook              # configure under Project Settings → Service Hooks

parameters:
  - name: workItemId
    type: string
    default: ''                                 # populated by webhook payload mapping

variables:
  - group: ai-sdlc-secrets                      # must contain: ANTHROPIC_API_KEY, ADO_PAT, SLACK_WEBHOOK_URL
  - name: CLAUDE_MODEL
    value: 'claude-opus-4-7'                    # design quality matters most here

jobs:
  - job: generate_design
    displayName: 'Generate design from work item'
    pool:
      vmImage: 'ubuntu-latest'
    timeoutInMinutes: 30
    steps:
      - checkout: self
        persistCredentials: true
        fetchDepth: 1

      - bash: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq
          # yq v4 binary (single file)
          sudo curl -sSLo /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          # Azure CLI + DevOps extension (agent image has az already; ensure extension)
          az extension add --name azure-devops --yes --only-show-errors
        displayName: 'Install tooling (jq, yq, az devops)'

      - bash: |
          set -euo pipefail
          echo "$(ADO_PAT)" | az devops login --organization "$(System.CollectionUri)"
          az devops configure --defaults \
            organization="$(System.CollectionUri)" \
            project="$(System.TeamProject)"
        displayName: 'Azure DevOps CLI login'
        env:
          ADO_PAT: $(ADO_PAT)

      - bash: |
          chmod +x .claude/hooks/*.sh .claude/scripts/*.sh
        displayName: 'Make hooks and scripts executable'

      - task: ClaudeCodeBaseTask@1
        displayName: 'Run Claude: /requirements-analysis'
        inputs:
          anthropicApiKey: $(ANTHROPIC_API_KEY)
          prompt: '/requirements-analysis ${{ parameters.workItemId }}'
          outputFormat: 'stream-json'
          maxTurns: 30
          model: $(CLAUDE_MODEL)
          allowedTools: 'Read,Write,Glob,Grep,Bash(git:*),Bash(gh:*),Bash(az:*),Bash(curl:*),Bash(jq:*),Bash(yq:*),Bash(.claude/scripts/*)'
          extraArgs: '--dangerously-skip-permissions'
        env:
          CLAUDE_RUN_ID: '$(Build.BuildId)'
          SLACK_WEBHOOK_URL: $(SLACK_WEBHOOK_URL)

      - bash: |
          set -euo pipefail
          mkdir -p "$(Build.ArtifactStagingDirectory)"
          if [[ -d .claude/trace ]]; then
            tar -czf "$(Build.ArtifactStagingDirectory)/claude-trace-${{ parameters.workItemId }}.tar.gz" .claude/trace
          fi
        displayName: 'Archive decision trace'
        condition: always()

      - publish: $(Build.ArtifactStagingDirectory)
        artifact: claude-trace
        condition: always()

      - bash: |
          set -euo pipefail
          if [[ -f .claude/trace/scope-blocks.jsonl ]]; then
            blocks=$(wc -l < .claude/trace/scope-blocks.jsonl)
            if [[ "$blocks" -gt 0 ]]; then
              echo "##vso[task.logissue type=warning]scope-enforce blocked $blocks operation(s) during this run"
            fi
          fi
        displayName: 'Report scope blocks'
        condition: always()

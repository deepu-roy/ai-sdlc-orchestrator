# Pipeline: implement-story
# Trigger: design PR merged into main (branch filter: design/WI-*).
# Role: Runs /implement-story orchestrator, which delegates to contract-dev, backend-dev,
#       frontend-dev subagents in parallel (contract-dev first if present).

trigger:
  branches:
    include: [main]
  paths:
    include:
      - 'docs/designs/WI-*/**'

pr: none

parameters:
  - name: workItemId
    type: string
    default: ''                                 # pass when triggered manually; auto-derived otherwise

variables:
  - group: ai-sdlc-secrets
  - name: CLAUDE_MODEL
    value: 'claude-sonnet-4-6'                  # bulk of work is mechanical; Sonnet is the sweet spot
  - name: PARENT_WI
    value: ${{ coalesce(parameters.workItemId, '') }}

jobs:
  - job: derive_wi
    displayName: 'Derive work item id from merge'
    pool: { vmImage: 'ubuntu-latest' }
    steps:
      - checkout: self
        fetchDepth: 5
      - bash: |
          set -euo pipefail
          if [[ -n "$(PARENT_WI)" ]]; then
            wi="$(PARENT_WI)"
          else
            # Extract from latest merge commit message. Expect "Merged PR ...: [Design] WI-<id>: ..."
            msg=$(git log -1 --pretty=%B)
            wi=$(echo "$msg" | grep -oE 'WI-[0-9]+' | head -1 | sed 's/WI-//')
          fi
          if [[ -z "${wi:-}" ]]; then
            echo "##vso[task.logissue type=error]Could not derive work item id"
            exit 1
          fi
          echo "Derived work item: WI-$wi"
          echo "##vso[task.setvariable variable=WI;isOutput=true]$wi"
        name: derive

  - job: orchestrate
    displayName: 'Orchestrate story implementation'
    dependsOn: derive_wi
    condition: succeeded()
    pool: { vmImage: 'ubuntu-latest' }
    timeoutInMinutes: 90
    variables:
      WI: $[ dependencies.derive_wi.outputs['derive.WI'] ]
    steps:
      - checkout: self
        persistCredentials: true
        fetchDepth: 0                           # full history — orchestrator branches around

      - bash: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq
          sudo curl -sSLo /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          az extension add --name azure-devops --yes --only-show-errors
        displayName: 'Install tooling'

      - bash: |
          set -euo pipefail
          echo "$(ADO_PAT)" | az devops login --organization "$(System.CollectionUri)"
          az devops configure --defaults \
            organization="$(System.CollectionUri)" \
            project="$(System.TeamProject)"
          # Configure git identity so orchestrator and subagents can commit.
          git config user.email "ai-sdlc@$(System.TeamProject).local"
          git config user.name "ai-sdlc[bot]"
        displayName: 'Login + git identity'
        env:
          ADO_PAT: $(ADO_PAT)

      - bash: chmod +x .claude/hooks/*.sh .claude/scripts/*.sh
        displayName: 'Make hooks and scripts executable'

      - task: ClaudeCodeBaseTask@1
        displayName: 'Run Claude: /implement-story'
        inputs:
          anthropicApiKey: $(ANTHROPIC_API_KEY)
          prompt: '/implement-story $(WI)'
          outputFormat: 'stream-json'
          maxTurns: 120
          model: $(CLAUDE_MODEL)
          allowedTools: 'Task,Read,Write,Edit,Glob,Grep,Bash(git:*),Bash(gh:*),Bash(az:*),Bash(curl:*),Bash(jq:*),Bash(yq:*),Bash(dotnet:*),Bash(npm:*),Bash(pnpm:*),Bash(npx:*),Bash(python:*),Bash(go:*),Bash(.claude/scripts/*)'
          extraArgs: '--dangerously-skip-permissions'
        env:
          CLAUDE_RUN_ID: '$(Build.BuildId)'
          SLACK_WEBHOOK_URL: $(SLACK_WEBHOOK_URL)

      - bash: |
          set -euo pipefail
          mkdir -p "$(Build.ArtifactStagingDirectory)"
          if [[ -d .claude/trace ]]; then
            tar -czf "$(Build.ArtifactStagingDirectory)/claude-trace-$(WI).tar.gz" .claude/trace
          fi
        displayName: 'Archive trace'
        condition: always()

      - publish: $(Build.ArtifactStagingDirectory)
        artifact: claude-trace
        condition: always()

      - bash: |
          set -euo pipefail
          if [[ -f .claude/trace/scope-blocks.jsonl ]]; then
            blocks=$(wc -l < .claude/trace/scope-blocks.jsonl)
            echo "Scope-enforce blocks during this run: $blocks"
            if [[ "$blocks" -gt 0 ]]; then
              cat .claude/trace/scope-blocks.jsonl
              echo "##vso[task.logissue type=warning]$blocks scope block(s) — a subagent tried to cross its boundary. Check the trace."
            fi
          fi
        displayName: 'Report scope blocks'
        condition: always()

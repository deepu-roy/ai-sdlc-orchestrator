# Workflow: post-merge
# Trigger: PR merged to main.
# Role: Close ADO work items, notify Slack. No AI invocation.

name: Post-Merge Cleanup

on:
  push:
    branches: [main]

env:
  ADO_PAT: ${{ secrets.ADO_PAT }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  cleanup:
    name: Close work items and notify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Setup
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
          az extension add --name azure-devops --yes --only-show-errors
          echo "$ADO_PAT" | az devops login --organization "${{ vars.ADO_ORG_URL }}"
          az devops configure --defaults \
            organization="${{ vars.ADO_ORG_URL }}" \
            project="${{ vars.ADO_PROJECT }}"
          chmod +x .github/scripts/*.sh

      - name: Close linked work items
        run: |
          msg=$(git log -1 --pretty=%B)
          wis=$(echo "$msg" | grep -oE 'WI-[0-9]+' | sort -u | sed 's/WI-//')
          if [[ -z "$wis" ]]; then
            echo "No work item references in merge commit."
            exit 0
          fi
          commit_url="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          for wi in $wis; do
            echo "Closing WI-$wi"
            .github/scripts/ado-wi-update.sh "$wi" \
              --state "Closed" \
              --discussion "Merged to main: $commit_url" || \
              echo "::warning::Failed to update WI-$wi"
          done

      - name: Slack notify
        run: |
          msg=$(git log -1 --pretty=%B)
          wis=$(echo "$msg" | grep -oE 'WI-[0-9]+' | sort -u | tr '\n' ' ')
          [[ -z "$wis" ]] && exit 0
          short_sha=$(echo "${{ github.sha }}" | cut -c1-8)
          .github/scripts/slack-notify.sh ":white_check_mark: Merged to main: $wis ($short_sha)" || true

# Workflow: implement-story
# Trigger: design PR merged (push to main with docs/designs/WI-* changes),
#          or manually via workflow_dispatch.
# Role: Run contract-dev first, then backend-dev + frontend-dev in parallel.

name: Implement Story

on:
  workflow_dispatch:
    inputs:
      work_item_id:
        description: 'Parent work item ID'
        required: true
        type: string
  push:
    branches: [main]
    paths:
      - 'docs/designs/WI-*/**'

env:
  COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
  ADO_PAT: ${{ secrets.ADO_PAT }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  derive-wi:
    name: Derive work item ID
    runs-on: ubuntu-latest
    outputs:
      wi: ${{ steps.derive.outputs.wi }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 5
      - name: Derive WI
        id: derive
        run: |
          if [[ -n "${{ inputs.work_item_id }}" ]]; then
            echo "wi=${{ inputs.work_item_id }}" >> "$GITHUB_OUTPUT"
          else
            msg=$(git log -1 --pretty=%B)
            wi=$(echo "$msg" | grep -oE 'WI-[0-9]+' | head -1 | sed 's/WI-//')
            if [[ -z "$wi" ]]; then
              echo "::error::Could not derive work item ID from merge commit"
              exit 1
            fi
            echo "wi=$wi" >> "$GITHUB_OUTPUT"
          fi

  contract:
    name: Contract-first (if applicable)
    needs: derive-wi
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
          sudo curl -sSLo /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          az extension add --name azure-devops --yes --only-show-errors
          echo "$ADO_PAT" | az devops login --organization "${{ vars.ADO_ORG_URL }}"
          az devops configure --defaults organization="${{ vars.ADO_ORG_URL }}" project="${{ vars.ADO_PROJECT }}"
          chmod +x .github/hooks/*.sh .github/scripts/*.sh .github/hooks/*.sh
          git config user.email "ai-sdlc[bot]@users.noreply.github.com"
          git config user.name "ai-sdlc[bot]"
          npm install -g @github/copilot

      - name: Check for contract slices
        id: check
        run: |
          slices_file="docs/designs/WI-${{ needs.derive-wi.outputs.wi }}/slices.md"
          if [[ -f "$slices_file" ]] && grep -q 'layer: contract' "$slices_file"; then
            echo "has_contract=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_contract=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run contract-dev
        if: steps.check.outputs.has_contract == 'true'
        run: |
          git checkout -b "story/WI-${{ needs.derive-wi.outputs.wi }}/contract"
          copilot \
            --agent contract-dev \
            --prompt "Implement contract slices for WI-${{ needs.derive-wi.outputs.wi }}. Read docs/designs/WI-${{ needs.derive-wi.outputs.wi }}/slices.md for details." \
            --accept-all
          git push --set-upstream origin "story/WI-${{ needs.derive-wi.outputs.wi }}/contract"
        env:
          GITHUB_RUN_ID: "${{ github.run_id }}-contract"

      - name: Prepare story branch
        run: |
          git checkout main && git pull
          git checkout -b "story/WI-${{ needs.derive-wi.outputs.wi }}"
          if git rev-parse --verify "origin/story/WI-${{ needs.derive-wi.outputs.wi }}/contract" >/dev/null 2>&1; then
            git merge --no-ff "origin/story/WI-${{ needs.derive-wi.outputs.wi }}/contract"
          fi
          git push --set-upstream origin "story/WI-${{ needs.derive-wi.outputs.wi }}"

  backend:
    name: Backend implementation
    needs: [derive-wi, contract]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "story/WI-${{ needs.derive-wi.outputs.wi }}"
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
          sudo curl -sSLo /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          az extension add --name azure-devops --yes --only-show-errors
          echo "$ADO_PAT" | az devops login --organization "${{ vars.ADO_ORG_URL }}"
          az devops configure --defaults organization="${{ vars.ADO_ORG_URL }}" project="${{ vars.ADO_PROJECT }}"
          chmod +x .github/hooks/*.sh .github/scripts/*.sh .github/hooks/*.sh
          git config user.email "ai-sdlc[bot]@users.noreply.github.com"
          git config user.name "ai-sdlc[bot]"
          npm install -g @github/copilot

      - name: Run backend-dev
        run: |
          git checkout -b "story/WI-${{ needs.derive-wi.outputs.wi }}/backend"
          copilot \
            --agent backend-dev \
            --prompt "Implement backend slices for WI-${{ needs.derive-wi.outputs.wi }}. Read docs/designs/WI-${{ needs.derive-wi.outputs.wi }}/slices.md." \
            --accept-all
          git push --set-upstream origin "story/WI-${{ needs.derive-wi.outputs.wi }}/backend"
        env:
          GITHUB_RUN_ID: "${{ github.run_id }}-backend"

      - name: Archive trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace-backend-${{ needs.derive-wi.outputs.wi }}
          path: .github/trace/
          retention-days: 90
          if-no-files-found: ignore

  frontend:
    name: Frontend implementation
    needs: [derive-wi, contract]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "story/WI-${{ needs.derive-wi.outputs.wi }}"
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
          sudo curl -sSLo /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          az extension add --name azure-devops --yes --only-show-errors
          echo "$ADO_PAT" | az devops login --organization "${{ vars.ADO_ORG_URL }}"
          az devops configure --defaults organization="${{ vars.ADO_ORG_URL }}" project="${{ vars.ADO_PROJECT }}"
          chmod +x .github/hooks/*.sh .github/scripts/*.sh .github/hooks/*.sh
          git config user.email "ai-sdlc[bot]@users.noreply.github.com"
          git config user.name "ai-sdlc[bot]"
          npm install -g @github/copilot

      - name: Run frontend-dev
        run: |
          git checkout -b "story/WI-${{ needs.derive-wi.outputs.wi }}/frontend"
          copilot \
            --agent frontend-dev \
            --prompt "Implement frontend slices for WI-${{ needs.derive-wi.outputs.wi }}. Read docs/designs/WI-${{ needs.derive-wi.outputs.wi }}/slices.md." \
            --accept-all
          git push --set-upstream origin "story/WI-${{ needs.derive-wi.outputs.wi }}/frontend"
        env:
          GITHUB_RUN_ID: "${{ github.run_id }}-frontend"

      - name: Archive trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace-frontend-${{ needs.derive-wi.outputs.wi }}
          path: .github/trace/
          retention-days: 90
          if-no-files-found: ignore

  merge-and-pr:
    name: Merge branches and open PR
    needs: [derive-wi, backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "story/WI-${{ needs.derive-wi.outputs.wi }}"
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
          az extension add --name azure-devops --yes --only-show-errors
          echo "$ADO_PAT" | az devops login --organization "${{ vars.ADO_ORG_URL }}"
          az devops configure --defaults organization="${{ vars.ADO_ORG_URL }}" project="${{ vars.ADO_PROJECT }}"
          chmod +x .github/scripts/*.sh
          git config user.email "ai-sdlc[bot]@users.noreply.github.com"
          git config user.name "ai-sdlc[bot]"

      - name: Merge sub-branches
        id: merge
        run: |
          WI="${{ needs.derive-wi.outputs.wi }}"
          git fetch origin

          # Merge backend if exists
          if git rev-parse --verify "origin/story/WI-$WI/backend" >/dev/null 2>&1; then
            git merge --no-ff "origin/story/WI-$WI/backend" -m "Merge backend for WI-$WI" || {
              echo "::error::Backend merge conflict — scope violation likely"
              echo "conflict=true" >> "$GITHUB_OUTPUT"
              exit 1
            }
          fi

          # Merge frontend if exists
          if git rev-parse --verify "origin/story/WI-$WI/frontend" >/dev/null 2>&1; then
            git merge --no-ff "origin/story/WI-$WI/frontend" -m "Merge frontend for WI-$WI" || {
              echo "::error::Frontend merge conflict — scope violation likely"
              echo "conflict=true" >> "$GITHUB_OUTPUT"
              exit 1
            }
          fi

          git push origin "story/WI-$WI"

      - name: Open feature PR
        run: |
          WI="${{ needs.derive-wi.outputs.wi }}"
          gh pr create \
            --base main \
            --head "story/WI-$WI" \
            --title "WI-$WI: Implementation" \
            --body "## Implementation of WI-$WI

          Backend and frontend slices implemented by AI-SDLC subagents.

          ### Review checklist
          - [ ] Code correctness
          - [ ] Security subagent comments addressed
          - [ ] Tech-debt subagent comments triaged

          Refs WI-$WI" \
            --draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update ADO + Slack
        run: |
          WI="${{ needs.derive-wi.outputs.wi }}"
          PR_URL=$(gh pr view "story/WI-$WI" --json url -q '.url' 2>/dev/null || echo "unknown")
          .github/scripts/ado-wi-update.sh "$WI" --state "Resolved" --discussion "Feature PR: $PR_URL" || true
          .github/scripts/slack-notify.sh "Feature PR open for WI-$WI — $PR_URL" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

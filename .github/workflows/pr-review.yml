# Workflow: pr-review
# Trigger: PR opened/updated on main.
# Role: Run three reviewer agents in parallel. None approves.

name: PR Review

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '.claude/trace/**'
      - 'docs/designs/**'

env:
  COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
  ADO_PAT: ${{ secrets.ADO_PAT }}

jobs:
  review:
    name: ${{ matrix.agent }} review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - agent: code-reviewer
            label: Code Review
          - agent: security-auditor
            label: Security Review
          - agent: tech-debt-auditor
            label: Tech Debt Review

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
          sudo curl -sSLo /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          az extension add --name azure-devops --yes --only-show-errors
          echo "$ADO_PAT" | az devops login --organization "${{ vars.ADO_ORG_URL }}" || true
          az devops configure --defaults organization="${{ vars.ADO_ORG_URL }}" project="${{ vars.ADO_PROJECT }}" || true
          chmod +x .claude/hooks/*.sh .claude/scripts/*.sh .github/hooks/*.sh
          npm install -g @github/copilot-cli

      - name: Run ${{ matrix.label }}
        run: |
          copilot \
            --agent "${{ matrix.agent }}" \
            --prompt "Review PR #${{ github.event.pull_request.number }} on branch ${{ github.head_ref }}. Run git diff origin/main...HEAD and post your findings as PR comments. Return your JSON summary at the end." \
            --accept-all
        env:
          CLAUDE_RUN_ID: "${{ github.run_id }}-${{ matrix.agent }}"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace-${{ matrix.agent }}-${{ github.event.pull_request.number }}
          path: .claude/trace/
          retention-days: 90
          if-no-files-found: ignore

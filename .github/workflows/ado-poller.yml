# Workflow: ado-poller
# Trigger: every hour (schedule), or manually.
# Role: Query ADO for work items tagged 'ai:ready', dispatch a repository_dispatch
#       event to design-gen for each one, then replace 'ai:ready' with 'ai:processing'
#       on the work item so re-polls do not re-fire it.

name: ADO Work Item Poller

on:
  schedule:
    - cron: "0 * * * *" # every hour at :00
  workflow_dispatch: {} # manual run for testing / catch-up

env:
  ADO_PAT: ${{ secrets.ADO_PAT }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  poll:
    name: Poll ADO for ai:ready work items
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write 

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup tooling and ADO login
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
          az extension add --name azure-devops --yes --only-show-errors
          echo "$ADO_PAT" | az devops login --organization "${{ vars.ADO_ORG_URL }}"
          az devops configure --defaults \
            organization="${{ vars.ADO_ORG_URL }}" \
            project="${{ vars.ADO_PROJECT }}"
          chmod +x .github/scripts/*.sh

      - name: Query work items tagged ai:ready
        id: query
        run: |
          set -euo pipefail

          # WIQL: find non-closed work items tagged ai:ready.
          # 'ai:processing' items are excluded because we replace 'ai:ready' with
          # 'ai:processing' after dispatch — they no longer carry the 'ai:ready' tag.
          wiql="SELECT [System.Id] FROM WorkItems \
            WHERE [System.Tags] CONTAINS 'ai:ready' \
              AND [System.State] NOT IN ('Closed', 'Resolved', 'Removed') \
            ORDER BY [System.Id] ASC"

          raw=$(az boards query --wiql "$wiql" --output json 2>/dev/null || echo "[]")

          # az boards query returns an array of objects with a top-level "id" field.
          ids=$(echo "$raw" | jq -r '.[].id // empty' | tr '\n' ' ' | xargs)

          echo "Found work items: ${ids:-none}"
          echo "ids=$ids" >> "$GITHUB_OUTPUT"

      - name: Notify Slack — nothing to process
        if: steps.query.outputs.ids == ''
        run: |
          .github/scripts/slack-notify.sh ":zzz: ADO poller: no work items tagged *ai:ready* found. Nothing dispatched."

      - name: Dispatch and mark each work item
        if: steps.query.outputs.ids != ''
        run: |
          set -euo pipefail

          dispatched=""
          failed=""

          for wi_id in ${{ steps.query.outputs.ids }}; do
            echo "--- Processing WI-$wi_id ---"

            # 1. Dispatch design-gen for this work item.
            jq -n --arg wi_id "$wi_id" \
              '{"event_type":"ado-workitem-ai-ready","client_payload":{"work_item_id":$wi_id}}' \
              | gh api "repos/${{ github.repository }}/dispatches" \
                  --method POST \
                  --input - \
              && { echo "Dispatched design-gen for WI-$wi_id"; dispatched="$dispatched WI-$wi_id"; } \
              || { echo "::error::Failed to dispatch for WI-$wi_id"; failed="$failed WI-$wi_id"; continue; }

            # 2. Remove 'ai:ready' and add 'ai:processing' to prevent re-dispatch
            #    on the next hourly poll. Read current tags first so we don't lose others.
            existing_tags=$(az boards work-item show --id "$wi_id" --output json \
              | jq -r '.fields["System.Tags"] // ""')

            # Split on ';', trim whitespace, drop 'ai:ready', rejoin, append 'ai:processing'.
            # Avoids \b word-boundary issues with the colon in the tag name.
            filtered=$(echo "$existing_tags" \
              | tr ';' '\n' \
              | sed 's/^ *//;s/ *$//' \
              | grep -v '^ai:ready$' \
              | grep -v '^$' \
              | paste -sd '; ' -)
            new_tags="${filtered:+${filtered}; }ai:processing"


            az boards work-item update --id "$wi_id" \
              --fields "System.Tags=$new_tags" \
              --output none \
              && echo "Tagged WI-$wi_id as ai:processing" \
              || echo "::warning::WI-$wi_id dispatched but tag update failed — may re-fire next poll"

            # Brief pause to avoid overwhelming the dispatch API.
            sleep 2
          done

          # Slack summary
          if [[ -n "${dispatched:-}" ]]; then
            .github/scripts/slack-notify.sh ":rocket: ADO poller dispatched design-gen for:$dispatched"
          fi
          if [[ -n "${failed:-}" ]]; then
            .github/scripts/slack-notify.sh ":warning: ADO poller *failed* to dispatch:$failed — check the workflow run for details."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
